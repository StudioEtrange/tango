
volumes:
  web2_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/${WEB2_ROOT_FOLDER}
    name: ${TANGO_APP_NAME}_web2_data
  transmission_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/transmission_data
    name: ${TANGO_APP_NAME}_transmission_data
  transmission_download:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/transmission_download
    name: ${TANGO_APP_NAME}_transmission_download
  transmission_watch:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/transmission_watch
    name: ${TANGO_APP_NAME}_transmission_watch
    
